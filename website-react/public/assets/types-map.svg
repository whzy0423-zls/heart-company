  <polygon points="150,40 245.3,205 54.7,205" fill="none" stroke="#1a1d1f" stroke-width="1.4"/>
  <polygon points="220.7,65.7 187.6,253.4 258.4,130.9 79.3,65.7 112.4,253.4 41.6,130.9" fill="none" stroke="#1a1d1f" stroke-width="1.4"/>
  <!-- 中心 -->
