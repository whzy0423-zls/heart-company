    <radialGradient id="sun" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffe9b8"/><stop offset="60%" stop-color="#f0a33c"/><stop offset="100%" stop-color="#c86a1f"/>
