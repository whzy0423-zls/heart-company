<style data-app-loading="inject-css">
  html {
    line-height: 1.15;
  }

  .loading {
    position: fixed;
    top: 0;
    left: 0;
    z-index: 9999;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    width: 100%;
    height: 100%;
    overflow: hidden;
    pointer-events: none;
    background-color: #f4f7f9;
  }

  .dark .loading {
    background-color: #0d0d10;
  }

  .loading.hidden {
    visibility: hidden;
    opacity: 0;
    transition: all 0.6s ease-out;
  }

  .loading-logo {
    position: relative;
    width: 88px;
    height: 88px;
  }

  .loading-logo::before {
    position: absolute;
    top: 100px;
    left: 50%;
    width: 60px;
    height: 8px;
    content: '';
    background: hsl(var(--primary, 210 100% 50%) / 35%);
    border-radius: 50%;
    filter: blur(1px);
    transform: translateX(-50%);
    animation: logo-shadow-ani 1.6s ease-in-out infinite;
  }

  .loading-logo img {
    display: block;
    width: 100%;
    height: 100%;
    object-fit: contain;
    filter: drop-shadow(0 10px 20px rgb(0 0 0 / 22%));
    transform-origin: 50% 50%;
    animation: logo-float-ani 1.6s ease-in-out infinite;
  }

  .loading .title {
    margin-top: 50px;
    font-size: 26px;
    font-weight: 700;
    letter-spacing: 1px;
    color: rgb(0 0 0 / 85%);
  }

  .dark .loading .title {
    color: rgb(255 255 255 / 88%);
  }

  .loading .bar {
    position: relative;
    width: 176px;
    height: 4px;
    margin-top: 26px;
    overflow: hidden;
    background-color: rgb(0 0 0 / 8%);
    border-radius: 999px;
  }

  .dark .loading .bar {
    background-color: rgb(255 255 255 / 12%);
  }

  .loading .bar::after {
    position: absolute;
    inset: 0;
    width: 40%;
    content: '';
    background: linear-gradient(90deg, #38a83a, #1f73c4, #e23a2f);
    border-radius: 999px;
    animation: bar-slide-ani 1.1s ease-in-out infinite;
  }

  @keyframes logo-float-ani {
    0%,
    100% {
      transform: translateY(0) scale(1);
    }

    50% {
      transform: translateY(-10px) scale(1.04);
    }
  }

  @keyframes logo-shadow-ani {
    0%,
    100% {
      opacity: 0.45;
      transform: translateX(-50%) scale(0.88, 1);
    }

    50% {
      opacity: 0.25;
      transform: translateX(-50%) scale(1.16, 1);
    }
  }

  @keyframes bar-slide-ani {
    0% {
      left: -40%;
    }

    100% {
      left: 100%;
    }
  }
</style>
<div class="loading" id="__app-loading__">
  <div class="loading-logo">
    <img id="nx-loading-logo" alt="%VITE_APP_TITLE%" src="/logo.png" />
  </div>
  <div class="title" id="nx-loading-title">%VITE_APP_TITLE%</div>
  <div class="bar"></div>
</div>
<script data-app-loading="inject-js">
  (function () {
    try {
      var raw = localStorage.getItem('nine-xing-admin-branding');
      if (!raw) return;
      var b = JSON.parse(raw);
      var logo = document.getElementById('nx-loading-logo');
      var title = document.getElementById('nx-loading-title');
      if (b && b.logo && logo) logo.src = b.logo;
      if (title) {
        var text = (b && (b.loadingText || b.name)) || '';
        if (text) title.textContent = text;
      }
    } catch (e) {
      /* 读取失败则保持默认品牌 */
    }
  })();
</script>
